<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Log</title>
    <style>
        body { background-color: #ffffff; color: #000000; font-family: -apple-system, sans-serif; padding: 24px; margin: 0; }
        .container { max-width: 450px; margin: 0 auto; }
        h1 { fontSize: 28px; font-weight: 900; margin-bottom: 4px; text-transform: uppercase; }
        .total-box { font-size: 42px; font-weight: 900; margin-bottom: 24px; border-bottom: 4px solid black; padding-bottom: 12px; }
        .input-group { display: flex; gap: 8px; margin-bottom: 24px; }
        input { flex: 1; padding: 14px; border: 2px solid black; font-size: 16px; font-weight: 600; border-radius: 0; outline: none; }
        button.add-btn { background-color: black; color: white; border: none; padding: 0 20px; font-weight: 800; cursor: pointer; }
        .item-card { border: 2px solid black; padding: 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .item-info b { font-weight: 800; font-size: 16px; display: block; }
        .item-info span { font-size: 12px; font-weight: 600; color: #555; }
        .item-right { display: flex; align-items: center; gap: 12px; }
        .cals { font-size: 18px; font-weight: 800; }
        .remove-btn { background: none; border: 1px solid #000; padding: 4px 8px; font-weight: 700; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nutrition Log</h1>
        <div class="total-box"><span id="totalCals">0</span> <small style="font-size: 18px; color: #666;">KCAL</small></div>
        
        <div class="input-group">
            <input type="text" id="foodInput" placeholder="Describe food...">
            <button class="add-btn" onclick="addFood()">ADD</button>
        </div>

        <div id="foodList"></div>
    </div>

    <script>
        let items = [];
        // CHANGE THIS to your Render URL
        const API_URL = "https://macro-food-app-2.onrender.com/track";

        async function addFood() {
            const input = document.getElementById('foodInput');
            if (!input.value) return;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: input.value})
                });
                const data = await response.json();
                items.push({...data, id: Date.now()});
                input.value = '';
                render();
            } catch (e) {
                alert("Server waking up... wait 20 seconds.");
            }
        }

        function removeFood(id) {
            items = items.filter(item => item.id !== id);
            render();
        }

        function render() {
            const list = document.getElementById('foodList');
            const total = document.getElementById('totalCals');
            
            list.innerHTML = items.map(item => `
                <div class="item-card">
                    <div class="item-info">
                        <b>${item.food.toUpperCase()}</b>
                        <span>P ${item.protein}g · C ${item.carbs}g · F ${item.fat}g</span>
                    </div>
                    <div class="item-right">
                        <span class="cals">${item.calories}</span>
                        <button class="remove-btn" onclick="removeFood(${item.id})">REMOVE</button>
                    </div>
                </div>
            `).join('');
            
            total.innerText = items.reduce((sum, item) => sum + item.calories, 0);
        }
    </script>
</body>
</html>
